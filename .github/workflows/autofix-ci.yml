name: Auto-fix CI

on:
  workflow_run:
    workflows: ["Build unsigned IPA"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  fix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_JIMMY }}
          claude_args: |
            --max-turns 60
            --model claude-opus-4-8
          prompt: |
            The "Build unsigned IPA" workflow failed on branch
            ${{ github.event.workflow_run.head_branch }}.

            Read CLAUDE.md. Fetch the failing run logs, find the root cause, and
            push a fix commit to that same branch. Common causes: new Swift files
            not added to the Xcode target in project.pbxproj, a broken protocol
            conformance after a contract change, or a wrong Xcode version.

            Do not revert other people's work. Do not weaken tests to make them
            pass. If the failure is caused by a missing capability that KSign
            cannot sign, remove the capability instead and say so in a comment.

            Work autonomously. Comment a one-paragraph summary on the PR when done.
